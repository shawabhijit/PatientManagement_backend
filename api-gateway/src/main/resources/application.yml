spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            ## http://localhost:8004/auth/api/login
            ## API Gateway --> http://auth-service:8005/api/login
            - id: auth-service-route
              uri: http://auth-service:8005
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1

            ## REST CLIENT -> http://localhost:8004/api/patients
            ## API Gateway -> http://patient-service:8001/patients (as strip-prefix is 1)
            ## patient-service -> /patients -> Patients array
            - id: patient-service-route
              uri: http://patient-service-01:8001
              predicates:
                - Path=/api/patients/**
              filters:
                - StripPrefix=1
                - JwtValidation
            ## Rest-Client -> http://localhost:8004/api-docs/patients
            ## API-Gateway -> http://patient-service-01:8001/v3/api-docs
            - id: api-docs-patient-route
              uri: http://patient-service-01:8001
              predicates:
                - Path=/api-docs/patients
              filters:
                - RewritePath=/api-docs/patients,/v3/api-docs
                - JwtValidation

            - id: patient-swagger-ui
              uri: http://patient-service-01:8001
              predicates:
                - Path=/swagger-ui/**

            - id: api-docs-auth-route
              uri: http://auth-service:8005
              predicates:
                - Path=/api-docs/auth
              filters:
                - RewritePath=/api-docs/auth,/v3/api-docs

            - id: billing-account-service-route
              uri: http://billing-service:8002
              predicates:
                - Path=/api/billing/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: billing-invoice-service-route
              uri: http://billing-service:8002
              predicates:
                - Path=/api/invoices/**
              filters:
                - StripPrefix=1
                - JwtValidation

            - id: api-docs-billing-route
              uri: http://billing-service:8002
              predicates:
                - Path=/api-docs/billing
              filters:
                - RewritePath=/api-docs/billing,/v3/api-docs

server:
  port: 8004

